[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.psram_type = opi
lib_deps = 
    h2zero/NimBLE-Arduino@^1.4.0
    bblanchon/ArduinoJson@^6.21.0
lib_ignore = esp_mbedtls_esp8266, FastLED
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_BT_NIMBLE_ENABLED=1

[env:xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.flash_mode = qio
board_build.flash_size = 4MB
board_build.psram_type = opi
lib_deps = 
    h2zero/NimBLE-Arduino@^1.4.0
    bblanchon/ArduinoJson@^6.21.0
lib_ignore = esp_mbedtls_esp8266, FastLED
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_BT_NIMBLE_ENABLED=1

[env:esp32-s3-supermini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_type = debug
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.psram_type = qio
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = default.csv
lib_deps = 
    h2zero/NimBLE-Arduino@^1.4.0
    bblanchon/ArduinoJson@^6.21.0
lib_ignore = esp_mbedtls_esp8266, FastLED
monitor_filters = esp32_exception_decoder
debug_tool = esp-prog
debug_init_break = tbreak setup
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DBOARD_HAS_PSRAM

[env:t_dongle_s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.psram_type = opi
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
    bblanchon/ArduinoJson@^6.21.0
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.0
    adafruit/Adafruit GFX Library@^1.11.0
    fastled/FastLED@^3.6.0
lib_ignore = esp_mbedtls_esp8266

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DBOARD_T_DONGLE_S3=1
    ; APA102 RGB LED pins
    -DLED_DATA_PIN=40
    -DLED_CLOCK_PIN=39

[env:t_dongle_c5]
; LilyGO T-Dongle C5 (ESP32-C5, dual-band 2.4/5GHz WiFi 6, BLE 5, single-core RISC-V).
;
; The C5 is NOT supported by the upstream `platformio/espressif32` platform yet, so
; this env uses the community "pioarduino" fork, which bundles Arduino-ESP32 3.3.x on
; ESP-IDF 5.x. The board definition lives in this repo under boards/Lilygo-T-Dongle-C5.json
; (vendored from LilyGO's official repo). To pin a specific toolchain, replace the URL
; below with a tagged release, e.g. .../platform-espressif32.git#55.03.39
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = Lilygo-T-Dongle-C5
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
lib_deps =
    ; NimBLE 2.x is required for the ESP-IDF 5.x / Arduino 3.x core used by the C5.
    ; (2.x renames the scan-callback API and changes scan durations to milliseconds;
    ; the BLE code in main.cpp is written against the 2.x API.)
    h2zero/NimBLE-Arduino@^2.2.0
    bblanchon/ArduinoJson@^6.21.0
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.0
    adafruit/Adafruit GFX Library@^1.11.0
    ; APA102 RGB LED driver (Pololu) is vendored in lib/APA102/ instead of FastLED,
    ; which does not yet have a pin map for the ESP32-C5.
lib_ignore = esp_mbedtls_esp8266, FastLED

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DBOARD_T_DONGLE_C5=1
    ; Selects the NimBLE 2.x scan API in main.cpp (see lib_deps note above).
    -DUSE_NIMBLE_V2=1
    ; Uncomment to also hop 5 GHz WiFi channels (C5 is dual-band). Off by default
    ; because 5 GHz promiscuous capture support in the C5 core is still maturing.
    ; -DENABLE_5GHZ_SCAN=1